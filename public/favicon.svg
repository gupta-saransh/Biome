<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B00CC"/>
      <stop offset="100%" stop-color="#45009D"/>
    </linearGradient>
  </defs>

  <!-- Background -->
